name: Live Skill Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run isolated Claude skill evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY is not configured; skipping scheduled Claude live eval."
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code
          node scripts/run-skill-evals.mjs --agent claude

  codex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run isolated Codex skill evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured; skipping scheduled Codex live eval."
            exit 0
          fi
          npm install -g @openai/codex
          node scripts/run-skill-evals.mjs --agent codex
