name: Validate

on:
  push:
  pull_request:

jobs:
  # Node-only core: build, typecheck, unit tests, pack smoke. No Python.
  node-core:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["18", "20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Generate version + typecheck
        run: |
          npm run gen-version
          npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Skill contract validation
        run: node scripts/validate-skill-evals.mjs
      - name: No-Python runtime scan
        run: node scripts/scan-python-runtime-refs.mjs
      - name: Release + package check
        run: npm run check-release
      - name: CLI version smoke
        run: node bin/project-intel.mjs --version
      - name: Pack smoke (Node-only install)
        run: node scripts/smoke-pack.mjs
