name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile CLI
        run: python -m py_compile plugins/project-intelligence/scripts/project_intel.py
      - name: Run tests
        run: python -m unittest discover -s plugins/project-intelligence/tests -p "test_*.py"
