name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compile CLI
        run: python -m compileall -q plugins/project-intelligence/scripts
      - name: Run tests
        run: python -m unittest discover -s plugins/project-intelligence/tests -p "test_*.py"
      - name: Validate plugin manifests and skills
        run: |
          python scripts/validate_bundle.py
          node scripts/validate-skill-evals.mjs
      - name: Validate npm package metadata
        run: |
          node scripts/check-release.mjs
          node scripts/check-package.mjs
          node bin/project-intel.mjs --version
          npm pack --dry-run

  cli-smoke:
    name: CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compile CLI
        run: python -m compileall -q plugins/project-intelligence/scripts
      - name: Run full cross-platform test suite
        run: python -m unittest discover -s plugins/project-intelligence/tests -p "test_*.py"
      - name: Validate skill contracts
        run: node scripts/validate-skill-evals.mjs
      - name: Validate package scripts
        run: npm run check-release
